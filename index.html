<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheckEdu - Brawl Style</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
</head>
<body>

    <div class="game-container">
        <header>
            <h1>CHECK<span>EDU</span></h1>
            <div class="stats">
                <span>Tarefas Pendentes: <b id="count">0</b></span>
            </div>
        </header>

        <section class="input-area">
            <input type="text" id="taskInput" placeholder="Nome do Trabalho/Matéria">
            <input type="text" id="profInput" placeholder="Professor(a)">
            <textarea id="reviewInput" placeholder="Anotações para Revisão..."></textarea>
            <button onclick="addTask()" class="btn-add">ADICIONAR!</button>
        </section>

        <main id="taskList">
            </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
